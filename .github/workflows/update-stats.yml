name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch GitHub Stats via GraphQL
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { contributionsCollection { totalCommitContributions contributionCalendar { totalContributions } } repositories(first: 100, isArchived: false, ownerAffiliations: OWNER) { totalCount } followers { totalCount } following { totalCount } } }"}' \
            https://api.github.com/graphql)
          
          echo "$DATA" | jq -r '
            .data.viewer as $v
            | "contributions=" + ($v.contributionsCollection.totalCommitContributions | tostring)
            | "total_contributions=" + ($v.contributionsCollection.contributionCalendar.totalContributions | tostring)
            | "repos=" + ($v.repositories.totalCount | tostring)
            | "followers=" + ($v.followers.totalCount | tostring)
            | "following=" + ($v.following.totalCount | tostring)
          ' >> $GITHUB_OUTPUT

      - name: Update README with new stats
        env:
          CONTRIBS: ${{ steps.stats.outputs.total_contributions }}
          REPOS: ${{ steps.stats.outputs.repos }}
          FOLLOWERS: ${{ steps.stats.outputs.followers }}
          FOLLOWING: ${{ steps.stats.outputs.following }}
        run: |
          sed -i "s/Contributions-[0-9]\+/Contributions-$CONTRIBS/g" README.md
          sed -i "s/Repos-[0-9]\+/Repos-$REPOS/g" README.md
          sed -i "s/Followers-[0-9]\+/Followers-$FOLLOWERS/g" README.md
          sed -i "s/Following-[0-9]\+/Following-$FOLLOWING/g" README.md

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git diff --quiet && exit 0
          git commit -m "📊 Auto-update GitHub stats [skip ci]"
          git push