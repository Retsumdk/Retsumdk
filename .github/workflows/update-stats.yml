name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch GitHub Stats via GraphQL
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { contributionsCollection { totalCommitContributions contributionCalendar { totalContributions } } repositories(first: 100, isArchived: false, ownerAffiliations: OWNER) { totalCount } followers { totalCount } following { totalCount } } }"}' \
            https://api.github.com/graphql)
          
          echo "resp=$RESPONSE" >> /tmp/gql_response.txt
          
          CONTRIBS=$(echo "$RESPONSE" | jq -r '.data.viewer.contributionsCollection.totalCommitContributions')
          TOTAL_CONTRIBS=$(echo "$RESPONSE" | jq -r '.data.viewer.contributionsCollection.contributionCalendar.totalContributions')
          REPOS=$(echo "$RESPONSE" | jq -r '.data.viewer.repositories.totalCount')
          FOLLOWERS=$(echo "$RESPONSE" | jq -r '.data.viewer.followers.totalCount')
          FOLLOWING=$(echo "$RESPONSE" | jq -r '.data.viewer.following.totalCount')
          
          echo "contributions=$CONTRIBS" >> $GITHUB_OUTPUT
          echo "total_contributions=$TOTAL_CONTRIBS" >> $GITHUB_OUTPUT
          echo "repos=$REPOS" >> $GITHUB_OUTPUT
          echo "followers=$FOLLOWERS" >> $GITHUB_OUTPUT
          echo "following=$FOLLOWING" >> $GITHUB_OUTPUT

      - name: Update README with new stats
        run: |
          echo "Stats from step:"
          echo "CONTRIBS: ${{ steps.stats.outputs.contributions }}"
          echo "TOTAL: ${{ steps.stats.outputs.total_contributions }}"
          echo "REPOS: ${{ steps.stats.outputs.repos }}"
          echo "FOLLOWERS: ${{ steps.stats.outputs.followers }}"
          echo "FOLLOWING: ${{ steps.stats.outputs.following }}"
          
          sed -i "s/Contributions-[0-9]\+/Contributions-${{ steps.stats.outputs.total_contributions }}/g" README.md
          sed -i "s/Repos-[0-9]\+/Repos-${{ steps.stats.outputs.repos }}/g" README.md
          sed -i "s/Followers-[0-9]\+/Followers-${{ steps.stats.outputs.followers }}/g" README.md
          sed -i "s/Following-[0-9]\+/Following-${{ steps.stats.outputs.following }}/g" README.md

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          git diff --quiet && exit 0
          git commit -m "📊 Auto-update GitHub stats [skip ci]"
          git push