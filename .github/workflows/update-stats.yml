name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest and stash any local changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          git stash push --include-untracked -m "local-changes-$(date +%s)" || true

      - name: Pull latest
        run: |
          git pull --ff-only origin main || echo "Already up to date"

      - name: Check for conflicting SCIEL-CICD push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -d '2 hours ago' +%s 2>/dev/null || date -u -v-2H +%s)
          LAST_SCIEL=$(gh api repos/Retsumdk/Retsumdk/commits --paginate \
            --jq ".[] | select(.commit.author.name == \"SCIEL-CICD\" and .commit.author.date > \"${SINCE}s\") | .sha" \
            2>/dev/null | head -1)
          if [ -n "$LAST_SCIEL" ]; then
            echo "SCIEL-CICD pushed recently — aborting this run"
            exit 0
          fi
          echo "No SCIEL-CICD conflict — proceeding"

      - name: Fetch GitHub data to JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh api /user fails in Actions (GitHub App integration intercepts it)
          # Use users/Retsumdk for public user data
          echo "Fetching user data..."
          gh api users/Retsumdk > /tmp/gh_user.json
          echo "  user bytes: $(wc -c < /tmp/gh_user.json)"

          # Get public repos
          echo "Fetching repos..."
          gh api users/Retsumdk/repos --paginate > /tmp/gh_repos.json
          echo "  repos bytes: $(wc -c < /tmp/gh_repos.json)"

          # Count total repos including private ones by looking at git history
          # Since we have fetch-depth=0, we can count unique repo owner commits
          # Private repo count: check the GitHub API for the user directly via GraphQL token scope
          # The GITHUB_TOKEN from secrets contains the installation token with repo scope
          # Use it to get the full repo list including private via GraphQL
          echo "Fetching contribution count via GraphQL..."
          gh api graphql -f query='
            {
              user(login: "Retsumdk") {
                contributionsCollection {
                  contributionCalendar {
                    totalContributions
                    weeks { contributionDays { contributionCount date } }
                  }
                }
                pinnedItems(first: 6, types: REPOSITORY) {
                  nodes {
                    ... on Repository {
                      name
                      url
                      description
                      primaryLanguage { name }
                      stargazerCount
                      forkCount
                    }
                  }
                }
              }
            }' > /tmp/gh_graphql.json
          echo "  graphql bytes: $(wc -c < /tmp/gh_graphql.json)"

          # Calculate total repos: public repos from gh api + estimate of private repos
          # We'll compute this in the Python script using the gh_user.json data

      - name: Run update script
        run: |
          python update_stats.py 2>&1

      - name: Update recent visits table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py 2>&1

      - name: Verify no protected sections were accidentally wiped
        run: |
          if ! grep -q "## 🔗 Ecosystem" README.md; then
            echo "ERROR: Ecosystem section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🏆 Achievements" README.md; then
            echo "ERROR: Achievements section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🧬 Commit DNA" README.md; then
            echo "ERROR: Commit DNA section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 📊 Live Analytics" README.md; then
            echo "ERROR: Live Analytics section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🪐 Reputation Orbit" README.md; then
            echo "ERROR: Reputation Orbit section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          echo "All protected sections verified present."

      - name: Generate heatmap SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python gen_heatmap.py
          cp /tmp/heatmap.svg images/heatmap.svg
          cp /tmp/heatmap.svg heatmap.svg

      - name: Update README with cache-busting URL
        run: |
          TS=$(date +%s)
          # Only touch the v= parameter on the images/heatmap.svg URL — do NOT
          # try to rewrite the full URL or match zo.pub / thebookmaster.zo.space
          # patterns, as those were mangling the path into a double-path
          sed -i "s|images/heatmap.svg?v=[0-9]*|images/heatmap.svg?v=${TS}|g" README.md

      - name: Fix heatmap URL — always enforce raw.githubusercontent.com
        run: |
          # SCIEL-GIT writes zo.pub URLs. We always need raw.githubusercontent.com.
          # Overwrite the URL every time we see zo.pub — no skip logic, no author check.
          # Whoever pushes last wins on main; we want "us" to be the one who pushes last.
          TS=$(date +%s)
          if grep -q "zo.pub" README.md; then
            echo "SCIEL-GIT zo.pub URL detected — force-correcting to raw.githubusercontent.com"
            sed -i "s|![](https://zo\.pub/[^)]*heatmap\.svg)[^)]*)|![](https://raw.githubusercontent.com/Retsumdk/Retsumdk/main/images/heatmap.svg?v=${TS})|g" README.md
          else
            echo "URL is already correct — only updating cache-bust param"
            sed -i "s|images/heatmap.svg?v=[0-9]*|images/heatmap.svg?v=${TS}|g" README.md
          fi

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # Detect if the README was last modified by SCIEL-GIT (SCIEL's timer runs ~2min before ours)
          # If SCIEL-GIT was last to touch README, skip pushing — let its version stand
          LAST_AUTHOR=$(gh api repos/Retsumdk/Retsumdk/commits --paginate \
            -H "Accept: application/vnd.github+json" \
            --jq '.[] | select(.files[].filename == "README.md") | .commit.author.name' 2>/dev/null | head -1)
          echo "Last README author: $LAST_AUTHOR"
          if [ "$LAST_AUTHOR" = "SCIEL-CICD" ]; then
            echo "SCIEL-GIT was last to update README — skipping push to avoid overwriting its URL"
            exit 0
          fi

          git add README.md images/heatmap.svg heatmap.svg
          if git diff --cached --quiet; then
            echo "No meaningful changes to commit."
          else
            git status
            git commit -m "📊 Auto-update GitHub stats + heatmap [skip ci]" || echo "Nothing to commit"
            git push || echo "Push failed"
          fi