name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest and stash any local changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          git stash push --include-untracked -m "local-changes-$(date +%s)" || true

      - name: Pull latest
        run: |
          git pull --ff-only origin main || echo "Already up to date"

      - name: Check for conflicting SCIEL-CICD push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -d '2 hours ago' +%s 2>/dev/null || date -u -v-2H +%s)
          LAST_SCIEL=$(gh api repos/Retsumdk/Retsumdk/commits --paginate \
            --jq ".[] | select(.commit.author.name == \"SCIEL-CICD\" and .commit.author.date > \"${SINCE}s\") | .sha" \
            2>/dev/null | head -1)
          if [ -n "$LAST_SCIEL" ]; then
            echo "SCIEL-CICD pushed recently — aborting this run"
            exit 0
          fi
          echo "No SCIEL-CICD conflict — proceeding"

      - name: Fetch GitHub data to JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use curl with -f to fail on HTTP errors so we detect auth failures
          echo "Fetching user data..."
          CURL_STATUS=$(curl -sL -f -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" \
                        -H "Accept: application/vnd.github+json" \
                        -H "X-GitHub-Api-Version: 2022-11-28" \
                        "https://api.github.com/user" -o /tmp/gh_user.json)
          echo "  user HTTP $CURL_STATUS bytes: $(wc -c < /tmp/gh_user.json)"
          if [ "$CURL_STATUS" != "200" ]; then
            echo "ERROR: User fetch failed with HTTP $CURL_STATUS"
            cat /tmp/gh_user.json
            exit 1
          fi

          echo "Fetching repos..."
          CURL_STATUS=$(curl -sL -f -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" \
                        -H "Accept: application/vnd.github+json" \
                        -H "X-GitHub-Api-Version: 2022-11-28" \
                        "https://api.github.com/user/repos?per_page=100&sort=updated&type=all" \
                        -o /tmp/gh_repos.json)
          echo "  repos HTTP $CURL_STATUS bytes: $(wc -c < /tmp/gh_repos.json)"
          if [ "$CURL_STATUS" != "200" ]; then
            echo "ERROR: Repos fetch failed with HTTP $CURL_STATUS"
            cat /tmp/gh_repos.json
            exit 1
          fi

          echo "Fetching GraphQL..."
          CURL_STATUS=$(curl -sL -f -w "%{http_code}" -X POST \
                        -H "Authorization: Bearer $GITHUB_TOKEN" \
                        -H "Accept: application/json" \
                        -H "Content-Type: application/json" \
                        -d '{"query":"{ user(login: \"Retsumdk\") { contributionsCollection { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } pinnedItems(first: 6, types: REPOSITORY) { nodes { ... on Repository { name url description primaryLanguage { name } stargazerCount forkCount } } } } }"}' \
                        "https://api.github.com/graphql" -o /tmp/gh_graphql.json)
          echo "  graphql HTTP $CURL_STATUS bytes: $(wc -c < /tmp/gh_graphql.json)"
          if [ "$CURL_STATUS" != "200" ]; then
            echo "ERROR: GraphQL fetch failed with HTTP $CURL_STATUS"
            cat /tmp/gh_graphql.json
            exit 1
          fi

      - name: Run update script
        run: |
          python update_stats.py 2>&1

      - name: Verify no protected sections were accidentally wiped
        run: |
          if ! grep -q "## 🔗 Ecosystem" README.md; then
            echo "ERROR: Ecosystem section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🏆 Achievements" README.md; then
            echo "ERROR: Achievements section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🧬 Commit DNA" README.md; then
            echo "ERROR: Commit DNA section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 📊 Live Analytics" README.md; then
            echo "ERROR: Live Analytics section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🪐 Reputation Orbit" README.md; then
            echo "ERROR: Reputation Orbit section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          echo "All protected sections verified present."

      - name: Generate heatmap SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python gen_heatmap.py
          cp /tmp/heatmap.svg images/heatmap.svg
          cp /tmp/heatmap.svg heatmap.svg

      - name: Update README with cache-busting URL
        run: |
          TS=$(date +%s)
          sed -i "s|https://zo\.pub/[^)]*heatmap\.svg[^)]*|https://raw.githubusercontent.com/Retsumdk/Retsumdk/main/images/heatmap.svg?v=${TS}|g" README.md
          sed -i "s|https://thebookmaster\.zo\.space/images/heatmap\.svg[^)]*|https://raw.githubusercontent.com/Retsumdk/Retsumdk/main/images/heatmap.svg?v=${TS}|g" README.md
          sed -i "s|images/heatmap\.svg?v=[0-9]*|https://raw.githubusercontent.com/Retsumdk/Retsumdk/main/images/heatmap.svg?v=${TS}|g" README.md

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md images/heatmap.svg heatmap.svg
          git status
          git commit -m "📊 Auto-update GitHub stats + heatmap [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed"