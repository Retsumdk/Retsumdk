name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest and stash any local changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main

      - name: Pull latest
        run: |
          # Use recursive merge strategy to auto-merge incoming changes
          git pull --no-rebase -X ours origin main 2>&1 || echo "Pull complete / already up to date"

      - name: Check for conflicting SCIEL-CICD push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -d '2 hours ago' +%s 2>/dev/null || date -u -v-2H +%s)
          LAST_SCIEL=$(gh api repos/Retsumdk/Retsumdk/commits --paginate \
            --jq ".[] | select(.commit.author.name == \"SCIEL-CICD\" and .commit.author.date > \"${SINCE}s\") | .sha" \
            2>/dev/null | head -1)
          if [ -n "$LAST_SCIEL" ]; then
            echo "SCIEL-CICD pushed recently — aborting this run"
            exit 0
          fi
          echo "No SCIEL-CICD conflict — proceeding"

      - name: Fetch GitHub data to JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh api /user fails in Actions (GitHub App integration intercepts it)
          # Use users/Retsumdk for public user data
          echo "Fetching user data..."
          gh api users/Retsumdk > /tmp/gh_user.json
          echo "  user bytes: $(wc -c < /tmp/gh_user.json)"

          # Get public repos
          echo "Fetching repos..."
          gh api users/Retsumdk/repos --paginate > /tmp/gh_repos.json
          echo "  repos bytes: $(wc -c < /tmp/gh_repos.json)"

          # Count total repos including private ones by looking at git history
          # Since we have fetch-depth=0, we can count unique repo owner commits
          # Private repo count: check the GitHub API for the user directly via GraphQL token scope
          # The GITHUB_TOKEN from secrets contains the installation token with repo scope
          # Use it to get the full repo list including private via GraphQL
          echo "Fetching contribution count via GraphQL..."
          gh api graphql -f query='
            {
              user(login: "Retsumdk") {
                contributionsCollection {
                  contributionCalendar {
                    totalContributions
                    weeks { contributionDays { contributionCount date } }
                  }
                }
                pinnedItems(first: 6, types: REPOSITORY) {
                  nodes {
                    ... on Repository {
                      name
                      url
                      description
                      primaryLanguage { name }
                      stargazerCount
                      forkCount
                    }
                  }
                }
              }
            }' > /tmp/gh_graphql.json
          echo "  graphql bytes: $(wc -c < /tmp/gh_graphql.json)"

          # Calculate total repos: public repos from gh api + estimate of private repos
          # We'll compute this in the Python script using the gh_user.json data

      - name: Run update script
        run: |
          python update_stats.py 2>&1

      - name: Update recent visits table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py 2>&1

      - name: Verify stats badges have real values (not 0)
        run: |
          # Ensure the stats badges are NOT showing 0 — that means update_stats.py ran but wrote bad data
          if grep -q "Contributions-0?style=flat-square" README.md || \
             grep -q "Repos-0-2ea44f?style=flat-square" README.md || \
             grep -q "Stars-0-2ea44f?style=flat-square" README.md; then
            echo "ERROR: Stats badges show 0 — update_stats.py failed to write real data! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          echo "Stats badges verified: real values confirmed."
          if ! grep -q "## 🏆 Achievements" README.md; then
            echo "ERROR: Achievements section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🧬 Commit DNA" README.md; then
            echo "ERROR: Commit DNA section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 📊 Live Analytics" README.md; then
            echo "ERROR: Live Analytics section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          if ! grep -q "## 🪐 Reputation Orbit" README.md; then
            echo "ERROR: Reputation Orbit section missing after update! Restoring from git..."
            git checkout README.md
            exit 1
          fi
          echo "All protected sections verified present."

      - name: Generate heatmap SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python gen_heatmap.py
          cp /tmp/heatmap.svg images/heatmap.svg
          cp /tmp/heatmap.svg heatmap.svg

      - name: Update README with cache-busting URL
        run: |
          TS=$(date +%s)
          # Only touch the v= parameter on the images/heatmap.svg URL — do NOT
          # try to rewrite the full URL or match zo.pub / thebookmaster.zo.space
          # patterns, as those were mangling the path into a double-path
          sed -i "s|images/heatmap.svg?v=[0-9]*|images/heatmap.svg?v=${TS}|g" README.md

      - name: Lock heatmap URL (heal corruption, then validate)
        run: |
          python3 << "FIXSCRIPT"
          import re, sys, time
          ts = str(int(time.time()))
          with open("README.md", "r") as f:
              content = f.read()

          # Pattern: find the LOCKED comment line and restore from it
          # This repairs corruption from ANY external script (SCIEL-CICD, SCIEL-GIT, etc.)
          match = re.search(r'<!-- HEATMAP LOCKED: Do not edit.*?-->\s*(!\[.*?\])\((https://raw\.githubusercontent\.com/Retsumdk/Retsumdk/main/images/heatmap\.svg)\?[^)]*\)', content, re.DOTALL)
          if match:
              locked_comment = match.group(1)  # <!-- HEATMAP LOCKED: ... -->
              url = match.group(2) + f"?v={ts}"
              new_line = f"{locked_comment}\n{url}"
              old_pattern = r'<!-- HEATMAP LOCKED: Do not edit this line\. Route: raw\.githubusercontent\.com only -->\s*!\[.*?\]\([^\)]+\)'
              if re.search(old_pattern, content):
                  new_content = re.sub(old_pattern, new_line, content, flags=re.DOTALL)
                  if new_content != content:
                      print(f"HEALED: Restored heatmap URL from locked comment (v={ts})")
                  else:
                      print("OK: Heatmap URL already correct")
              else:
                  print("WARNING: Locked comment exists but pattern doesn't match, rebuilding...")
                  new_content = re.sub(
                      r'<!-- DAILY COMMITS START -->.*?<!-- DAILY COMMITS END -->',
                      f'<!-- DAILY COMMITS START -->\n<!-- HEATMAP LOCKED: Do not edit this line. Route: raw.githubusercontent.com only -->\n![](https://raw.githubusercontent.com/Retsumdk/Retsumdk/main/images/heatmap.svg?v={ts})\n<!-- DAILY COMMITS END -->',
                      content, flags=re.DOTALL
                  )
                  print("REBUILT: Replaced entire DAILY COMMITS section from scratch")
              with open("README.md", "w") as f:
                  f.write(new_content)
          else:
              print("ERROR: No LOCKED marker found — heatmap section missing!")
              sys.exit(1)

          # Validate: detect any remaining HEATMAP corruption
          # Flag ONLY heatmap.svg URLs served from zo.pub / thebookmaster.zo.space
          # pixel.gif is a profile tracker — never contains "heatmap", exclude it explicitly
          bad = [m for m in re.findall(r'https?://zo\.pub/[^)\s]+|https?://thebookmaster\.zo\.space/[^)\s]+', content)
                 if 'heatmap' in m and 'pixel' not in m]
          if bad:
              print(f"FATAL: {len(bad)} corrupt URL(s) remain after healing:")
              for b in bad: print(f"  {b}")
              sys.exit(1)
          print("✅ Heatmap URL verified clean — raw.githubusercontent.com")
          FIXSCRIPT


      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # Pull latest before committing to prevent race-condition push failures
          git pull --no-rebase -X ours origin main || echo "Pull complete / already up-to-date"

          git add README.md images/heatmap.svg heatmap.svg
          if git diff --cached --quiet; then
            echo "No meaningful changes to commit."
          else
            git status
            git commit -m "📊 Auto-update GitHub stats + heatmap [skip ci]" || echo "Nothing to commit"
            git push || echo "Push failed"
          fi